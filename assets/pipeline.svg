<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 410" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#566573"/>
    </marker>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="520" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#1a5276">An occupancy world model = ( history , condition ) &#8594; future scene</text>
  <text x="520" y="51" text-anchor="middle" font-size="13" fill="#566573">the boxes below are the <tspan font-style="italic">design axes</tspan> you choose on &#8212; this list is organized by them, not by date</text>

  <!-- inputs -->
  <rect x="18" y="120" width="150" height="52" rx="9" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.5"/>
  <text x="93" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2833">History</text>
  <text x="93" y="160" text-anchor="middle" font-size="11" fill="#566573">occ x[t&#8722;k..t]</text>

  <rect x="18" y="200" width="150" height="66" rx="9" fill="#fef9e7" stroke="#b7950b" stroke-width="1.6"/>
  <text x="93" y="221" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7d6608">Condition · axis 3</text>
  <text x="93" y="238" text-anchor="middle" font-size="10" fill="#7d6608">ego · action · layout</text>
  <text x="93" y="252" text-anchor="middle" font-size="10" fill="#7d6608">· language · per-agent</text>

  <!-- representation -->
  <rect x="208" y="120" width="150" height="120" rx="9" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.5"/>
  <text x="283" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2833">Representation</text>
  <text x="283" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#1a5276">axis 1</text>
  <text x="283" y="180" text-anchor="middle" font-size="10" fill="#566573">voxel · VQ-token</text>
  <text x="283" y="195" text-anchor="middle" font-size="10" fill="#566573">triplane · hexplane</text>
  <text x="283" y="210" text-anchor="middle" font-size="10" fill="#566573">gaussian · cont. VAE</text>
  <text x="283" y="228" text-anchor="middle" font-size="9.5" font-style="italic" fill="#85929e">how to compress</text>

  <!-- mechanism -->
  <rect x="398" y="120" width="150" height="120" rx="9" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.5"/>
  <text x="473" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2833">Mechanism</text>
  <text x="473" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#1a5276">axis 2</text>
  <text x="473" y="182" text-anchor="middle" font-size="10" fill="#566573">token-AR</text>
  <text x="473" y="197" text-anchor="middle" font-size="10" fill="#566573">diffusion / DiT</text>
  <text x="473" y="212" text-anchor="middle" font-size="10" fill="#566573">next-scale · flow</text>
  <text x="473" y="228" text-anchor="middle" font-size="9.5" font-style="italic" fill="#85929e">how to generate</text>

  <!-- rollout -->
  <rect x="588" y="120" width="150" height="120" rx="9" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.5"/>
  <text x="663" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2833">Rollout &#38; horizon</text>
  <text x="663" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#1a5276">axis 4</text>
  <text x="663" y="182" text-anchor="middle" font-size="10" fill="#566573">autoregressive</text>
  <text x="663" y="197" text-anchor="middle" font-size="10" fill="#566573">anti-drift</text>
  <text x="663" y="212" text-anchor="middle" font-size="9.5" fill="#c0392b">(borrow from video)</text>
  <text x="663" y="228" text-anchor="middle" font-size="9.5" font-style="italic" fill="#85929e">how to stay stable</text>

  <!-- future occ -->
  <rect x="778" y="120" width="120" height="120" rx="9" fill="#eafaf1" stroke="#1e8449" stroke-width="1.6"/>
  <text x="838" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#145a32">Future occ</text>
  <text x="838" y="176" text-anchor="middle" font-size="11" fill="#1e8449">x[t+1..t+H]</text>
  <text x="838" y="206" text-anchor="middle" font-size="9.5" font-style="italic" fill="#85929e">the prediction</text>

  <!-- render -->
  <rect x="922" y="120" width="100" height="120" rx="9" fill="#f4ecf7" stroke="#6c3483" stroke-width="1.5"/>
  <text x="972" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#4a235a">Render</text>
  <text x="972" y="170" text-anchor="middle" font-size="9.5" fill="#6c3483">multi-view</text>
  <text x="972" y="184" text-anchor="middle" font-size="9.5" fill="#6c3483">video</text>
  <text x="972" y="202" text-anchor="middle" font-size="9.5" fill="#6c3483">/ LiDAR</text>

  <!-- arrows -->
  <line x1="168" y1="146" x2="206" y2="158" stroke="#566573" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="168" y1="233" x2="396" y2="205" stroke="#b7950b" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <line x1="358" y1="180" x2="396" y2="180" stroke="#566573" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="548" y1="180" x2="586" y2="180" stroke="#566573" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="738" y1="180" x2="776" y2="180" stroke="#566573" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="898" y1="180" x2="920" y2="180" stroke="#566573" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- autoregressive feedback -->
  <path d="M 838 240 L 838 270 L 663 270 L 663 242" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="750" y="285" text-anchor="middle" font-size="10" fill="#c0392b">feed back &#8212; autoregressive rollout (where movers blur &#38; drift)</text>

  <!-- supervision / eval band -->
  <rect x="208" y="318" width="690" height="64" rx="9" fill="#fbfcfc" stroke="#aab7b8" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="225" y="338" font-size="11.5" font-weight="700" fill="#1c2833">Supervision · axis 5</text>
  <text x="225" y="354" font-size="10" fill="#566573">GT-occ labels · self-supervised (LiDAR) · vision-centric (RGB) · pretraining</text>
  <text x="225" y="372" font-size="10" fill="#566573"><tspan font-weight="700" fill="#1c2833">Evaluation:</tspan> recon IoU · forecasting mIoU&#215;horizon · gen FID3D/F3D · controllability · downstream mAP/L2</text>
  <line x1="553" y1="240" x2="553" y2="316" stroke="#aab7b8" stroke-width="1" stroke-dasharray="2 3"/>
</svg>
