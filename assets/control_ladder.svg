<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="la" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a5276"/>
    </marker>
  </defs>

  <text x="520" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#1a5276">Conditioning / controllability ladder (axis 3)</text>
  <text x="520" y="51" text-anchor="middle" font-size="13" fill="#566573">each rung = finer control over the generated future. The top rung is <tspan font-weight="700" fill="#c0392b">empty</tspan>.</text>

  <!-- diagonal axis -->
  <line x1="60" y1="395" x2="980" y2="95" stroke="#d5dbdb" stroke-width="2.5" marker-end="url(#la)"/>
  <text x="520" y="415" text-anchor="middle" font-size="11" font-style="italic" fill="#85929e">coarser control &#8594; finer control</text>

  <!-- rung 0 -->
  <rect x="40" y="338" width="158" height="58" rx="8" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.4"/>
  <text x="119" y="360" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1c2833">Unconditional</text>
  <text x="119" y="378" text-anchor="middle" font-size="9.5" fill="#566573">SemCity · PDD · XCube</text>

  <!-- rung 1 -->
  <rect x="208" y="288" width="158" height="58" rx="8" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.4"/>
  <text x="287" y="310" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1c2833">Ego-pose / trajectory</text>
  <text x="287" y="328" text-anchor="middle" font-size="9.5" fill="#566573">DOME · OccSora · OccWorld</text>

  <!-- rung 2 -->
  <rect x="376" y="238" width="158" height="58" rx="8" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.4"/>
  <text x="455" y="260" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1c2833">Action (vel / steer)</text>
  <text x="455" y="278" text-anchor="middle" font-size="9.5" fill="#566573">Drive-OccWorld · GenieDrive</text>

  <!-- rung 3 -->
  <rect x="544" y="188" width="158" height="58" rx="8" fill="#eaf2f8" stroke="#1a5276" stroke-width="1.4"/>
  <text x="623" y="210" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1c2833">BEV layout</text>
  <text x="623" y="228" text-anchor="middle" font-size="9.5" fill="#566573">UniScene · DynamicCity</text>

  <!-- rung 4 -->
  <rect x="712" y="138" width="158" height="58" rx="8" fill="#fef9e7" stroke="#b7950b" stroke-width="1.6"/>
  <text x="791" y="160" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7d6608">Language (scene)</text>
  <text x="791" y="178" text-anchor="middle" font-size="9.5" fill="#7d6608">OccScene · X-Scene</text>

  <!-- rung 5 frontier -->
  <rect x="848" y="84" width="172" height="62" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="934" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#c0392b">Per-mover behavior</text>
  <text x="934" y="123" text-anchor="middle" font-size="9.5" fill="#c0392b">&#10022; OPEN FRONTIER</text>
  <text x="934" y="138" text-anchor="middle" font-size="9" font-style="italic" fill="#c0392b">&#8220;the left car cuts in&#8221;</text>

  <!-- connectors between rungs -->
  <line x1="198" y1="358" x2="208" y2="330" stroke="#aab7b8" stroke-width="1.2"/>
  <line x1="366" y1="308" x2="376" y2="280" stroke="#aab7b8" stroke-width="1.2"/>
  <line x1="534" y1="258" x2="544" y2="230" stroke="#aab7b8" stroke-width="1.2"/>
  <line x1="702" y1="208" x2="712" y2="180" stroke="#aab7b8" stroke-width="1.2"/>
  <line x1="870" y1="158" x2="848" y2="128" stroke="#aab7b8" stroke-width="1.2"/>
</svg>
